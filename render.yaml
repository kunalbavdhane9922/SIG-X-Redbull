services:
  # Backend Web Service (Node.js)
  - type: web
    name: sig-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 8080

  # Frontend Static Site
  - type: static
    name: sig-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: sig-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
